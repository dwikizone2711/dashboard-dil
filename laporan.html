<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Laporan Produksi</title>
<style>
  :root {
    --bg: #0f1115; --card: #1c1f26; --text: #f1f1f1; --hint: #8a8f98;
    --link: #5eb5f7; --button: #2ea6ff; --button-text: #ffffff;
    --border: rgba(255,255,255,0.08);
    --green: #34c759; --red: #ff5b5b; --amber: #ffb020;
    --radius: 14px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; padding: 16px 16px 32px 16px;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 15px; line-height: 1.4;
  }
  h1 { font-size: 19px; font-weight: 800; margin: 4px 0 2px 0; }
  .sub { color: var(--hint); font-size: 12.5px; margin-bottom: 18px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12.5px; font-weight: 700; color: var(--hint); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 7px; }
  .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .choice-btn {
    flex: 1; min-width: 80px; padding: 12px 8px; border-radius: 10px;
    background: var(--card); border: 1.5px solid var(--border); color: var(--text);
    font-size: 14px; font-weight: 700; text-align: center; cursor: pointer;
  }
  .choice-btn.selected { background: var(--button); border-color: var(--button); color: var(--button-text); }
  input[type=number], input[type=text], textarea {
    width: 100%; padding: 12px 14px; border-radius: 10px;
    background: var(--card); border: 1.5px solid var(--border); color: var(--text);
    font-size: 16px; font-family: inherit;
  }
  textarea { resize: vertical; min-height: 60px; }
  input:focus, textarea:focus { outline: none; border-color: var(--button); }
  .live-calc {
    margin-top: 8px; padding: 10px 12px; background: rgba(46,166,255,0.08);
    border-radius: 10px; font-size: 13px; color: var(--link);
  }
  .live-calc b { color: var(--text); }
  .submit-btn {
    width: 100%; padding: 15px; border-radius: 12px; border: none;
    background: var(--button); color: var(--button-text); font-size: 16px; font-weight: 800;
    margin-top: 8px; cursor: pointer;
  }
  .submit-btn:disabled { opacity: 0.5; }
  .op-banner {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 14px; margin-bottom: 18px; display: flex; align-items: center; gap: 10px;
  }
  .op-banner .avatar {
    width: 36px; height: 36px; border-radius: 50%; background: var(--button);
    display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; flex-shrink: 0;
  }
  .op-banner .nama { font-weight: 700; font-size: 14.5px; }
  .op-banner .peran { font-size: 12px; color: var(--hint); }

  .error-box { background: rgba(255,91,91,0.12); border: 1px solid rgba(255,91,91,0.3); color: var(--red); border-radius: 10px; padding: 12px 14px; margin-bottom: 16px; font-size: 13.5px; }

  .loading { display: flex; align-items: center; justify-content: center; padding: 60px 0; color: var(--hint); gap: 10px; }
  .spinner { width: 18px; height: 18px; border-radius: 50%; border: 2.5px solid rgba(255,255,255,0.15); border-top-color: var(--button); animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .receipt { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
  .receipt .status-badge { display: inline-block; padding: 5px 12px; border-radius: 8px; font-size: 12.5px; font-weight: 800; margin-bottom: 14px; }
  .receipt .status-badge.approved { background: rgba(52,199,89,0.15); color: var(--green); }
  .receipt .status-badge.flagged { background: rgba(255,176,32,0.15); color: var(--amber); }
  .receipt-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13.5px; }
  .receipt-row:last-child { border-bottom: none; }
  .receipt-row .l { color: var(--hint); }
  .receipt-row .v { font-weight: 700; text-align: right; }
  .receipt-row .v.total { color: var(--green); font-size: 16px; }
  .flag-note { background: rgba(255,176,32,0.1); border-radius: 10px; padding: 10px 12px; margin-top: 12px; font-size: 12.5px; color: var(--amber); }
  .new-btn { width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid var(--border); background: transparent; color: var(--text); font-size: 15px; font-weight: 700; margin-top: 16px; }
  .refresh-corner { position: fixed; top: 12px; right: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 6px 12px; font-size: 12px; color: var(--hint); cursor: pointer; z-index: 100; }
</style>
</head>
<body>

<div class="refresh-corner" onclick="location.reload()">↻ Refresh</div>
<div id="app">
  <div class="loading"><div class="spinner"></div> Memuat...</div>
</div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby2wyVacT1kFqYt5481dypHMCp5T_Eg_KertLLWXNE0yu3YqKg4RiDNiqKWPlwGvhCxqw/exec';
  const tg = window.Telegram ? window.Telegram.WebApp : null;
  if (tg) { tg.ready(); tg.expand(); }

  const chatId = new URLSearchParams(window.location.search).get('chatId');
  const app = document.getElementById('app');

  const state = { shift: null, gauge: null };
  let namaOperator = '';

  function fRp(n) { return 'Rp ' + Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.'); }
  function escapeHtml(s) { return String(s == null ? '-' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function init() {
    if (!chatId) {
      app.innerHTML = '<div class="error-box">Link enggak lengkap. Buka lewat command /laporan di chat bot.</div>';
      return;
    }
    app.innerHTML = '<div class="loading"><div class="spinner"></div> Memeriksa akun...</div>';
    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'cek_operator_miniapp', data: { chatId } })
    })
      .then(r => r.json())
      .then(res => {
        if (!res.ditemukan) {
          app.innerHTML = '<div class="error-box">🔒 ' + escapeHtml(res.alasan) + '</div>';
          return;
        }
        namaOperator = res.nama;
        renderForm();
      })
      .catch(err => {
        app.innerHTML = '<div class="error-box">Gagal terhubung ke server.<br>' + escapeHtml(err.message) + '</div>';
      });
  }

  function renderForm() {
    app.innerHTML = `
      <div class="op-banner">
        <div class="avatar">${escapeHtml(namaOperator.charAt(0).toUpperCase())}</div>
        <div><div class="nama">${escapeHtml(namaOperator)}</div><div class="peran">Laporan Produksi Hari Ini</div></div>
      </div>

      <div class="field">
        <label>Shift</label>
        <div class="btn-group" id="shiftGroup">
          <div class="choice-btn" data-val="Shift 1 (00.00-08.00)">Shift 1</div>
          <div class="choice-btn" data-val="Shift 2 (08.00-16.00)">Shift 2</div>
        </div>
      </div>

      <div class="field">
        <label>Gauge Kawat (BWG)</label>
        <div class="btn-group" id="gaugeGroup">
          <div class="choice-btn" data-val="14">14</div>
          <div class="choice-btn" data-val="15">15</div>
          <div class="choice-btn" data-val="16">16</div>
        </div>
      </div>

      <div class="field">
        <label>Jumlah Roll Terpakai</label>
        <input type="number" id="inputRoll" inputmode="decimal" placeholder="Contoh: 4.5" step="0.5" min="0.5" max="50">
        <div class="live-calc" id="calcBerat" style="display:none"></div>
      </div>

      <div class="field">
        <label>Berat Reject / Sisa (kg)</label>
        <input type="number" id="inputReject" inputmode="decimal" placeholder="Contoh: 3.5" step="0.1" min="0">
        <div class="live-calc" id="calcJadi" style="display:none"></div>
      </div>

      <div class="field">
        <label>Koli Kawat Jelek</label>
        <input type="number" id="inputKoli" inputmode="numeric" placeholder="0" value="0" min="0">
      </div>

      <div class="field">
        <label>Catatan (opsional)</label>
        <textarea id="inputCatatan" placeholder="Ada kendala atau catatan lain?"></textarea>
      </div>

      <div id="errorArea"></div>
      <button class="submit-btn" id="btnSubmit">Kirim Laporan</button>
    `;

    document.getElementById('shiftGroup').addEventListener('click', (e) => {
      const btn = e.target.closest('.choice-btn'); if (!btn) return;
      document.querySelectorAll('#shiftGroup .choice-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      state.shift = btn.dataset.val;
    });
    document.getElementById('gaugeGroup').addEventListener('click', (e) => {
      const btn = e.target.closest('.choice-btn'); if (!btn) return;
      document.querySelectorAll('#gaugeGroup .choice-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      state.gauge = btn.dataset.val;
    });

    const inputRoll = document.getElementById('inputRoll');
    const inputReject = document.getElementById('inputReject');
    function updateCalc() {
      const roll = parseFloat(inputRoll.value);
      const calcBerat = document.getElementById('calcBerat');
      if (roll > 0) {
        const berat = roll * 49.5;
        calcBerat.style.display = 'block';
        calcBerat.innerHTML = 'Berat kawat: <b>' + berat.toFixed(1) + ' kg</b>';

        const reject = parseFloat(inputReject.value);
        const calcJadi = document.getElementById('calcJadi');
        if (!isNaN(reject) && reject >= 0 && reject < berat) {
          const jadi = berat - reject;
          const set = Math.round(jadi / 0.168);
          calcJadi.style.display = 'block';
          calcJadi.innerHTML = 'Berat jadi: <b>' + jadi.toFixed(1) + ' kg</b> &middot; Estimasi set: <b>' + set + ' pcs</b>';
        } else {
          calcJadi.style.display = 'none';
        }
      } else {
        calcBerat.style.display = 'none';
      }
    }
    inputRoll.addEventListener('input', updateCalc);
    inputReject.addEventListener('input', updateCalc);

    document.getElementById('btnSubmit').addEventListener('click', submitLaporan);
  }

  function submitLaporan() {
    const errorArea = document.getElementById('errorArea');
    errorArea.innerHTML = '';

    const rollTerpakai = document.getElementById('inputRoll').value;
    const beratRejectKg = document.getElementById('inputReject').value;
    const koliKawatJelek = document.getElementById('inputKoli').value;
    const catatan = document.getElementById('inputCatatan').value;

    if (!state.shift) { errorArea.innerHTML = '<div class="error-box">Pilih shift dulu.</div>'; return; }
    if (!state.gauge) { errorArea.innerHTML = '<div class="error-box">Pilih gauge dulu.</div>'; return; }
    if (!rollTerpakai || parseFloat(rollTerpakai) <= 0) { errorArea.innerHTML = '<div class="error-box">Isi jumlah roll dulu.</div>'; return; }
    if (beratRejectKg === '' || parseFloat(beratRejectKg) < 0) { errorArea.innerHTML = '<div class="error-box">Isi berat reject dulu.</div>'; return; }

    const btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.textContent = 'Mengirim...';

    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'submit_laporan_produksi',
        data: { chatId, shift: state.shift, gauge: state.gauge, rollTerpakai, beratRejectKg, koliKawatJelek, catatan }
      })
    })
      .then(r => r.json())
      .then(res => {
        if (!res.success) {
          errorArea.innerHTML = '<div class="error-box">❗ ' + escapeHtml(res.error) + '</div>';
          btn.disabled = false;
          btn.textContent = 'Kirim Laporan';
          return;
        }
        renderReceipt(res);
      })
      .catch(err => {
        errorArea.innerHTML = '<div class="error-box">Gagal kirim. ' + escapeHtml(err.message) + '</div>';
        btn.disabled = false;
        btn.textContent = 'Kirim Laporan';
      });
  }

  function renderReceipt(r) {
    const statusClass = r.status === 'Approved' ? 'approved' : 'flagged';
    const statusText = r.status === 'Approved' ? '✅ Approved' : '⚠️ Perlu Dicek Supervisor';

    let html = '<div class="receipt">';
    html += '<div class="status-badge ' + statusClass + '">' + statusText + '</div>';
    html += '<div class="receipt-row"><div class="l">Operator</div><div class="v">' + escapeHtml(r.nama) + '</div></div>';
    html += '<div class="receipt-row"><div class="l">Shift</div><div class="v">' + escapeHtml(r.shift) + (r.isLembur ? ' (LEMBUR)' : '') + '</div></div>';
    html += '<div class="receipt-row"><div class="l">Gauge</div><div class="v">BWG' + r.gauge + '</div></div>';
    html += '<div class="receipt-row"><div class="l">Roll</div><div class="v">' + r.rollTerpakai + ' roll (' + r.beratRollKg + ' kg)</div></div>';
    html += '<div class="receipt-row"><div class="l">Reject</div><div class="v">' + r.beratRejectKg + ' kg (' + r.rejectPct + ')</div></div>';
    html += '<div class="receipt-row"><div class="l">Berat Jadi</div><div class="v">' + r.beratJadiKg + ' kg</div></div>';
    html += '<div class="receipt-row"><div class="l">Jumlah Set</div><div class="v">' + r.jumlahSet + ' pcs</div></div>';
    if (r.koliKawatJelek > 0) html += '<div class="receipt-row"><div class="l">Koli Jelek</div><div class="v">' + r.koliKawatJelek + ' koli</div></div>';
    html += '<div class="receipt-row"><div class="l">Upah Produksi</div><div class="v">' + fRp(r.upahNormal) + '</div></div>';
    if (r.upahKoli > 0) html += '<div class="receipt-row"><div class="l">Upah Koli</div><div class="v">' + fRp(r.upahKoli) + '</div></div>';
    html += '<div class="receipt-row"><div class="l">Tunjangan</div><div class="v">' + fRp(r.tunjangan) + '</div></div>';
    html += '<div class="receipt-row"><div class="l">TOTAL</div><div class="v total">' + fRp(r.totalUpah) + '</div></div>';

    if (r.flags && r.flags.length > 0) {
      html += '<div class="flag-note">⚠️ ' + r.flags.map(escapeHtml).join('<br>') + '<br>Laporan ini bakal dicek manual sama supervisor.</div>';
    }
    if (r.konversiAccurate) {
      html += '<div class="receipt-row"><div class="l">Push Accurate</div><div class="v">' + (r.konversiAccurate.success ? '✅ #' + escapeHtml(r.konversiAccurate.adjustmentNumber) : '⚠️ ' + escapeHtml(r.konversiAccurate.error || 'Gagal')) + '</div></div>';
    }
    html += '</div>';
    html += '<button class="new-btn" onclick="renderForm()">+ Buat Laporan Baru</button>';

    app.innerHTML = html;
  }

  init();
</script>
</body>
</html>
