<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Beli Kardus</title>
<style>
  :root { --bg:#0f1115;--card:#1c1f26;--text:#f1f1f1;--hint:#8a8f98;--link:#5eb5f7;--button:#2ea6ff;--button-text:#fff;--border:rgba(255,255,255,0.08);--green:#34c759;--red:#ff5b5b;--radius:14px; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; padding:16px 16px 32px 16px; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size:15px; line-height:1.4; }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:12.5px; font-weight:700; color:var(--hint); text-transform:uppercase; letter-spacing:0.3px; margin-bottom:7px; }
  input[type=number] { width:100%; padding:12px 14px; border-radius:10px; background:var(--card); border:1.5px solid var(--border); color:var(--text); font-size:16px; font-family:inherit; }
  input:focus { outline:none; border-color:var(--button); }
  .live-calc { margin-top:8px; padding:10px 12px; background:rgba(46,166,255,0.08); border-radius:10px; font-size:13px; color:var(--link); }
  .live-calc b { color:var(--text); }
  .submit-btn { width:100%; padding:15px; border-radius:12px; border:none; background:var(--button); color:var(--button-text); font-size:16px; font-weight:800; margin-top:8px; cursor:pointer; }
  .submit-btn:disabled { opacity:0.5; }
  .op-banner { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px; margin-bottom:18px; display:flex; align-items:center; gap:10px; }
  .op-banner .avatar { width:36px; height:36px; border-radius:50%; background:var(--button); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:15px; flex-shrink:0; }
  .op-banner .nama { font-weight:700; font-size:14.5px; }
  .op-banner .peran { font-size:12px; color:var(--hint); }
  .error-box { background:rgba(255,91,91,0.12); border:1px solid rgba(255,91,91,0.3); color:var(--red); border-radius:10px; padding:12px 14px; margin-bottom:16px; font-size:13.5px; }
  .loading { display:flex; align-items:center; justify-content:center; padding:60px 0; color:var(--hint); gap:10px; }
  .spinner { width:18px; height:18px; border-radius:50%; border:2.5px solid rgba(255,255,255,0.15); border-top-color:var(--button); animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .receipt { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px; }
  .receipt .status-badge { display:inline-block; padding:5px 12px; border-radius:8px; font-size:12.5px; font-weight:800; margin-bottom:14px; background:rgba(52,199,89,0.15); color:var(--green); }
  .receipt-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:13.5px; }
  .receipt-row:last-child { border-bottom:none; }
  .receipt-row .l { color:var(--hint); }
  .receipt-row .v { font-weight:700; text-align:right; }
  .receipt-row .v.total { color:var(--green); font-size:16px; }
  .new-btn { width:100%; padding:14px; border-radius:12px; border:1.5px solid var(--border); background:transparent; color:var(--text); font-size:15px; font-weight:700; margin-top:16px; }

  .refresh-corner { position: fixed; top: 12px; right: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 6px 12px; font-size: 12px; color: var(--hint); cursor: pointer; z-index: 100; }
</style>
</head>
<body>
<div class="refresh-corner" onclick="location.reload()">↻ Refresh</div>
<div id="app"><div class="loading"><div class="spinner"></div> Memuat...</div></div>
<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby2wyVacT1kFqYt5481dypHMCp5T_Eg_KertLLWXNE0yu3YqKg4RiDNiqKWPlwGvhCxqw/exec';
  const tg = window.Telegram ? window.Telegram.WebApp : null;
  if (tg) { tg.ready(); tg.expand(); }
  const chatId = new URLSearchParams(window.location.search).get('chatId');
  const app = document.getElementById('app');
  let namaAdmin = '';

  function fRp(n) { return 'Rp ' + Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.'); }
  function escapeHtml(s) { return String(s == null ? '-' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function init() {
    if (!chatId) { app.innerHTML = '<div class="error-box">Link enggak lengkap. Buka lewat tombol di chat bot.</div>'; return; }
    fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'cek_operator_miniapp', data: { chatId } }) })
      .then(r => r.json())
      .then(res => {
        if (!res.ditemukan) { app.innerHTML = '<div class="error-box">🔒 ' + escapeHtml(res.alasan) + '</div>'; return; }
        if (res.role !== 'Admin') { app.innerHTML = '<div class="error-box">🔒 Fitur ini cuma buat Admin.</div>'; return; }
        namaAdmin = res.nama;
        renderForm();
      })
      .catch(err => { app.innerHTML = '<div class="error-box">Gagal terhubung ke server.<br>' + escapeHtml(err.message) + '</div>'; });
  }

  function renderForm() {
    app.innerHTML = `
      <div class="op-banner">
        <div class="avatar">${escapeHtml(namaAdmin.charAt(0).toUpperCase())}</div>
        <div><div class="nama">${escapeHtml(namaAdmin)}</div><div class="peran">Pembelian Kardus</div></div>
      </div>
      <div class="field">
        <label>Jumlah (pcs)</label>
        <input type="number" id="inputJumlah" inputmode="numeric" placeholder="Contoh: 1000" min="1">
      </div>
      <div class="field">
        <label>Harga per Pcs</label>
        <input type="number" id="inputHarga" inputmode="numeric" placeholder="Contoh: 1500" min="1">
        <div class="live-calc" id="calcTotal" style="display:none"></div>
      </div>
      <div id="errorArea"></div>
      <button class="submit-btn" id="btnSubmit">Catat Pembelian</button>
    `;
    function updateCalc() {
      const jumlah = parseFloat(document.getElementById('inputJumlah').value);
      const harga = parseFloat(document.getElementById('inputHarga').value);
      const calcTotal = document.getElementById('calcTotal');
      if (jumlah > 0 && harga > 0) {
        calcTotal.style.display = 'block';
        calcTotal.innerHTML = 'Total: <b>' + fRp(jumlah * harga) + '</b>';
      } else { calcTotal.style.display = 'none'; }
    }
    document.getElementById('inputJumlah').addEventListener('input', updateCalc);
    document.getElementById('inputHarga').addEventListener('input', updateCalc);
    document.getElementById('btnSubmit').addEventListener('click', submitData);
  }

  function submitData() {
    const errorArea = document.getElementById('errorArea');
    errorArea.innerHTML = '';
    const jumlahKardus = document.getElementById('inputJumlah').value;
    const hargaPerKardus = document.getElementById('inputHarga').value;
    if (!jumlahKardus || parseFloat(jumlahKardus) < 1) { errorArea.innerHTML = '<div class="error-box">Isi jumlah dulu.</div>'; return; }
    if (!hargaPerKardus || parseFloat(hargaPerKardus) < 1) { errorArea.innerHTML = '<div class="error-box">Isi harga dulu.</div>'; return; }

    const btn = document.getElementById('btnSubmit');
    btn.disabled = true; btn.textContent = 'Mengirim...';

    const url = APPS_SCRIPT_URL + '?action=beli_kardus'
      + '&jumlahKardus=' + encodeURIComponent(jumlahKardus)
      + '&hargaPerKardus=' + encodeURIComponent(hargaPerKardus)
      + '&namaAdmin=' + encodeURIComponent(namaAdmin);

    fetch(url).then(r => r.json()).then(res => {
      if (!res || !res.success) {
        errorArea.innerHTML = '<div class="error-box">❗ ' + escapeHtml(res ? res.error : 'Gagal terhubung') + '</div>';
        btn.disabled = false; btn.textContent = 'Catat Pembelian';
        return;
      }
      renderReceipt(res);
    }).catch(err => {
      errorArea.innerHTML = '<div class="error-box">Gagal kirim. ' + escapeHtml(err.message) + '</div>';
      btn.disabled = false; btn.textContent = 'Catat Pembelian';
    });
  }

  function renderReceipt(r) {
    const accStatus = r.accuratePush && r.accuratePush.success ? '✅ #' + escapeHtml(r.accuratePush.accurateNumber) : '❌ ' + escapeHtml(r.accuratePush ? r.accuratePush.error : 'Gagal');
    let html = '<div class="receipt">';
    html += '<div class="status-badge">✅ Tercatat</div>';
    html += '<div class="receipt-row"><div class="l">Supplier</div><div class="v">' + escapeHtml(r.namaSupplier) + '</div></div>';
    html += '<div class="receipt-row"><div class="l">Jumlah</div><div class="v">' + r.jumlahKardus + ' pcs</div></div>';
    html += '<div class="receipt-row"><div class="l">Harga/pcs</div><div class="v">' + fRp(r.hargaPerKardus) + '</div></div>';
    html += '<div class="receipt-row"><div class="l">TOTAL</div><div class="v total">' + fRp(r.totalNilai) + '</div></div>';
    html += '<div class="receipt-row"><div class="l">Push Accurate</div><div class="v">' + accStatus + '</div></div>';
    html += '</div>';
    html += '<button class="new-btn" onclick="renderForm()">+ Catat Baru</button>';
    app.innerHTML = html;
  }

  init();
</script>
</body>
</html>
